name: CI

on:
  push:
    branches: [main, dev]
    paths:
      - "BallisticSolutions/**"
  pull_request:
    branches: [main]
    paths:
      - "BallisticSolutions/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build --configuration Release
        working-directory: BallisticSolutions

      - name: Test
        run: dotnet test --no-build --configuration Release
        working-directory: BallisticSolutions
